model:
  name: "facebook/nllb-200-distilled-600M"
  src_lang: "eng_Latn"
  use_fast_tokenizer: true

inference:
  max_length: 512
  num_beams: 5
  no_repeat_ngram_size: 3
  temperature: 0.9

messages:
